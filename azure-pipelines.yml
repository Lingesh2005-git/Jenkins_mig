trigger:
  branches:
    include:
    - main
pool:
  vmImage: ubuntu-latest
stages:
- stage: Build
  displayName: Build Stage
  jobs:
  - job: MavenBuild
    displayName: Build Java Application
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        mavenOptions: '-Xmx3072m'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '1.11'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'
        goals: 'package'
    - task: CmdLine@2
      displayName: 'Build Success Message'
      inputs:
        script: |
          echo "Build completed successfully."
- stage: Deploy
  displayName: Deploy Stage
  dependsOn:
  - Build
  jobs:
  - job: DeployJob
    displayName: Simulated Deployment
    steps:
    - task: CmdLine@2
      displayName: 'Deployment Step'
      inputs:
        script: |
          echo "Starting deployment..."
          echo "Application deployed successfully using Non-Classic YAML Pipeline."
